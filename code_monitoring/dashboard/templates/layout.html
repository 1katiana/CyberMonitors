<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cyber Monitors</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            background: #0a0b10; /* Fond très sombre */
            color: #e0e0e0;
        }

        nav {
            background: #121420;
            border-bottom: 1px solid #1f2235;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

            .nav-links a:hover {
                color: #00e5ff;
            }

        .container {
            padding: 30px;
            max-width: 1000px;
            margin: auto;
        }
    </style>
</head>
<body>
    <nav>
        <div style="font-size: 1.5rem; font-weight: bold;">🛡️ Cyber Monitors</div>
        <div class="nav-links">
            <a href="/">🏠 Accueil</a>
            {% for m in nav_machines %}
            <a href="/asset/{{ m }}">{{ m }}</a>
            {% endfor %}
        </div>
    </nav>
    <div class="container-fluid" style="margin-top: 10px;">
        {% if current_crises %}
        {% for crisis in current_crises %}
        <div class="alert-box-urgent">
            <span class="symbol">⚠️</span>
            <strong>ALERTE SUR {{ crisis.asset }} :</strong>
            {{ crisis.details | join(', ') }}
            <span class="time">({{ crisis.time.split(' ')[-1] }})</span>
        </div>
        {% endfor %}
        {% endif %}
    </div>

    <style>
        .alert-box-urgent {
            background: linear-gradient(90deg, #ff3d00, #ff1744);
            color: white;
            padding: 12px 20px;
            margin-bottom: 8px;
            border-radius: 5px;
            font-weight: bold;
            border-left: 8px solid #b2102f;
            animation: pulse-red 2s infinite;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(255, 61, 0, 0.3);
        }

            .alert-box-urgent .symbol {
                font-size: 1.5rem;
                margin-right: 15px;
            }

            .alert-box-urgent .time {
                margin-left: auto;
                font-family: monospace;
                opacity: 0.8;
            }

        @keyframes pulse-red {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.01);
                box-shadow: 0 4px 25px rgba(255, 61, 0, 0.5);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
   

    <style>
        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            100% {
                transform: translateX(0);
            }
    </style>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
