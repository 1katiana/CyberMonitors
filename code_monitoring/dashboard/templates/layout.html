<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cyber Monitors</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            background: #0a0b10; /* Fond très sombre */
            color: #e0e0e0;
        }

        nav {
            background: #121420;
            border-bottom: 1px solid #1f2235;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

            .nav-links a:hover {
                color: #00e5ff;
            }

        .container {
            padding: 30px;
            max-width: 1000px;
            margin: auto;
        }
    </style>
</head>
<body>
    <nav>
        <div style="font-size: 1.5rem; font-weight: bold;">🛡️ Cyber Monitors</div>
        <div class="nav-links">
            <a href="/">🏠 Accueil</a>
            {% for m in nav_machines %}
            <a href="/asset/{{ m }}">{{ m }}</a>
            {% endfor %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
